name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      env:
        LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
        LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
        GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
        INVALID_EMAIL: ${{ secrets.INVALID_EMAIL }}
        INVALID_PASSWORD: ${{ secrets.INVALID_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
        AUTH_URL: ${{ secrets.AUTH_URL }}
        EXPECTED_URL: ${{ secrets.EXPECTED_URL }}
        SERVICES_URL: ${{ secrets.SERVICES_URL }}
        EMPLOYEE_NAME: ${{ secrets.EMPLOYEE_NAME }}
        SERVICE_DURATION: ${{ secrets.SERVICE_DURATION }}
        SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
        SERVICE_PRICE: ${{ secrets.SERVICE_PRICE }}
        SLOT_TIME: ${{ secrets.SLOT_TIME }}
      run: npx playwright test

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30